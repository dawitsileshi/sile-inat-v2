services:
  - type: web
    name: maternal-wellness-app
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: LLM_API_KEY
        sync: false
